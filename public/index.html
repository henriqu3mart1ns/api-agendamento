<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Agendamentos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Sistema de Agendamentos</h1>

    <div class="card">

        <form id="formAgendamento">

            <input type="hidden" id="idAgendamento">

            <input
                type="text"
                id="nome"
                placeholder="Nome do solicitante"
                required>

            <input
                type="text"
                id="telefone"
                placeholder="Telefone"
                required>

            <input
                type="datetime-local"
                id="dataHora"
                required>

            <input
                type="text"
                id="profissional"
                placeholder="Nome do profissional"
                required>

            <button
                type="submit"
                class="btn-salvar">
                Salvar Agendamento
            </button>

        </form>

    </div>

    <div class="card">

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Solicitante</th>
                    <th>Telefone</th>
                    <th>Data/Hora</th>
                    <th>Profissional</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="tabelaAgendamentos"></tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
